<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pimpinan — VIQUAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0b1d28;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 16px;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-logo .icon-wrap {
            width: 64px; height: 64px;
            background: #0b1d28;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .brand-logo .icon-wrap i {
            color: #3b9ede;
            font-size: 1.6rem;
        }

        .brand-logo h4 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0b1d28;
            margin: 0;
        }

        .brand-logo p {
            font-size: .75rem;
            color: #64748b;
            margin: 4px 0 0;
        }

        .form-label {
            font-size: .78rem;
            font-weight: 600;
            color: #374151;
        }

        .form-control {
            font-size: .85rem;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            padding: 10px 14px;
        }

        .form-control:focus {
            border-color: #0b1d28;
            box-shadow: 0 0 0 3px rgba(11,29,40,.12);
        }

        .btn-login {
            background: #0b1d28;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-size: .85rem;
            font-weight: 600;
            width: 100%;
            transition: opacity .2s;
        }

        .btn-login:hover { opacity: .88; color: #fff; }

        .alert {
            font-size: .8rem;
            border-radius: 8px;
        }

        .divider-text {
            font-size: .7rem;
            color: #94a3b8;
            text-align: center;
            margin: 20px 0 0;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="brand-logo">
            <div class="icon-wrap"><i class="fas fa-water"></i></div>
            <h4>VIQUAM</h4>
            <p>Portal Pimpinan — Akses Terbatas</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Masukkan username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>Masuk sebagai Pimpinan
            </button>
        </form>

        <p class="divider-text">Hanya akun dengan hak akses Pimpinan yang dapat masuk.</p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
